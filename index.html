<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive Book Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
  header { background: #1a1a2e; color: #fff; padding: 2rem 1.5rem 1.5rem; text-align: center; }
  header h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; }
  header p { font-size: 0.95rem; opacity: 0.7; margin-top: 0.4rem; }
  .search-bar { display: flex; gap: 8px; max-width: 680px; margin: 1.25rem auto 0; }
  .search-bar input { flex: 1; padding: 0.65rem 1rem; border-radius: 8px; border: none; font-size: 1rem; outline: none; }
  .search-bar button { padding: 0.65rem 1.25rem; background: #e67e22; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; white-space: nowrap; }
  .search-bar button:hover { background: #cf6d17; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; max-width: 900px; margin: 1rem auto 0; padding: 0 1rem; }
  .filters select { padding: 0.4rem 0.75rem; border-radius: 6px; border: 1px solid #ddd; font-size: 0.875rem; background: #fff; cursor: pointer; }
  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  .status { text-align: center; color: #666; font-size: 0.9rem; padding: 2rem 0; }
  .results-info { font-size: 0.85rem; color: #666; margin-bottom: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s, box-shadow 0.15s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .card-img { width: 100%; height: 220px; object-fit: cover; background: #e8e4dc; display: flex; align-items: center; justify-content: center; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img .no-cover { font-size: 2.5rem; color: #bbb; }
  .card-body { padding: 0.85rem; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .card-title { font-size: 0.9rem; font-weight: 600; line-height: 1.3; color: #1a1a1a; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-author { font-size: 0.8rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-year { font-size: 0.75rem; color: #888; }
  .card-formats { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; padding-top: 8px; }
  .fmt-badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 4px; text-decoration: none; font-weight: 500; }
  .fmt-pdf  { background: #fde8d8; color: #b04a0e; }
  .fmt-epub { background: #d8ede0; color: #1a6b3a; }
  .fmt-text { background: #dce8fc; color: #1a4f9e; }
  .fmt-other { background: #eee; color: #555; }
  .card-link { font-size: 0.75rem; color: #e67e22; text-decoration: none; margin-top: 4px; }
  .card-link:hover { text-decoration: underline; }
  .load-more { display: block; margin: 1.5rem auto 0; padding: 0.65rem 2rem; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
  .load-more:hover { background: #2a2a4e; }
  .load-more:disabled { opacity: 0.5; cursor: default; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #ccc; border-top-color: #e67e22; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>Archive Book Finder</h1>
  <p>Search millions of free books from the Internet Archive</p>
  <div class="search-bar">
    <input type="text" id="q" placeholder="Search by title, author, or subject…" />
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="filters">
    <select id="mediatype">
      <option value="texts">All Books</option>
      <option value="texts&subject=fiction">Fiction</option>
      <option value="texts&subject=science">Science</option>
      <option value="texts&subject=history">History</option>
      <option value="texts&subject=philosophy">Philosophy</option>
      <option value="texts&subject=mathematics">Mathematics</option>
    </select>
    <select id="lang">
      <option value="">Any language</option>
      <option value="eng">English</option>
      <option value="fre">French</option>
      <option value="ger">German</option>
      <option value="spa">Spanish</option>
    </select>
    <select id="sort">
      <option value="-downloads">Most downloaded</option>
      <option value="-date">Newest first</option>
      <option value="date">Oldest first</option>
      <option value="titleSorter">Title A–Z</option>
    </select>
    <select id="year-from">
      <option value="">From year…</option>
    </select>
    <select id="year-to">
      <option value="">To year…</option>
    </select>
  </div>
</header>

<div class="main">
  <div id="status" class="status">Enter a search term to find books.</div>
  <div id="results-info" class="results-info" style="display:none"></div>
  <div id="grid" class="grid"></div>
  <button id="load-more" class="load-more" style="display:none" onclick="loadMore()">Load more</button>
</div>

<script>
let page = 1, lastQ = '', lastTotal = 0;

(function populateYears() {
  const now = new Date().getFullYear();
  const from = document.getElementById('year-from');
  const to = document.getElementById('year-to');
  for (let y = now; y >= 1400; y--) {
    from.innerHTML += `<option value="${y}">${y}</option>`;
    to.innerHTML += `<option value="${y}">${y}</option>`;
  }
})();

document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

function formatBadges(id, formats) {
  const fmts = formats || [];
  let html = '';
  const base = `https://archive.org/download/${id}/`;
  if (fmts.includes('Text PDF')) html += `<a class="fmt-badge fmt-pdf" href="${base}${id}.pdf" target="_blank">PDF</a>`;
  else if (fmts.some(f => f.includes('PDF'))) html += `<a class="fmt-badge fmt-pdf" href="https://archive.org/details/${id}" target="_blank">PDF</a>`;
  if (fmts.some(f => f.includes('EPUB'))) html += `<a class="fmt-badge fmt-epub" href="https://archive.org/details/${id}" target="_blank">EPUB</a>`;
  if (fmts.some(f => f.includes('Plain Text') || f === 'DjVuTXT')) html += `<a class="fmt-badge fmt-text" href="https://archive.org/details/${id}" target="_blank">TXT</a>`;
  if (!html) html = `<a class="fmt-badge fmt-other" href="https://archive.org/details/${id}" target="_blank">View</a>`;
  return html;
}

function renderCards(docs) {
  const grid = document.getElementById('grid');
  docs.forEach(doc => {
    const id = doc.identifier;
    const title = doc.title || 'Untitled';
    const author = Array.isArray(doc.creator) ? doc.creator.join(', ') : (doc.creator || '');
    const year = doc.date ? doc.date.substring(0, 4) : '';
    const cover = `https://archive.org/services/img/${id}`;
    const formats = Array.isArray(doc.format) ? doc.format : (doc.format ? [doc.format] : []);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img">
        <img src="${cover}" alt="" onerror="this.parentElement.innerHTML='<span class=no-cover>📖</span>'"/>
      </div>
      <div class="card-body">
        <div class="card-title" title="${title.replace(/"/g,'&quot;')}">${title}</div>
        ${author ? `<div class="card-author">${author}</div>` : ''}
        ${year ? `<div class="card-year">${year}</div>` : ''}
        <div class="card-formats">${formatBadges(id, formats)}</div>
        <a class="card-link" href="https://archive.org/details/${id}" target="_blank">View on Archive.org →</a>
      </div>`;
    grid.appendChild(card);
  });
}

async function fetchBooks(q, pg) {
  const lang = document.getElementById('lang').value;
  const sort = document.getElementById('sort').value;
  const mt = document.getElementById('mediatype').value;
  let qStr = `(${q}) AND mediatype:(${mt})`;
  if (lang) qStr += ` AND language:(${lang})`;
  const yFrom = document.getElementById('year-from').value;
  const yTo = document.getElementById('year-to').value;
  if (yFrom && yTo) qStr += ` AND date:[${yFrom} TO ${yTo}]`;
  else if (yFrom) qStr += ` AND date:[${yFrom} TO 9999]`;
  else if (yTo) qStr += ` AND date:[0000 TO ${yTo}]`;
  const rows = 20, start = (pg - 1) * rows;
  const url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(qStr)}&fl=identifier,title,creator,date,format,subject&sort=${sort}&rows=${rows}&start=${start}&output=json`;
  const res = await fetch(url);
  const data = await res.json();
  return data.response;
}

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  lastQ = q; page = 1;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('load-more').style.display = 'none';
  document.getElementById('results-info').style.display = 'none';
  document.getElementById('status').innerHTML = '<span class="spinner"></span> Searching…';
  try {
    const resp = await fetchBooks(q, 1);
    lastTotal = resp.numFound;
    document.getElementById('status').style.display = 'none';
    if (resp.docs.length === 0) {
      document.getElementById('status').style.display = '';
      document.getElementById('status').textContent = 'No books found. Try a different search.';
      return;
    }
    document.getElementById('results-info').style.display = '';
    document.getElementById('results-info').textContent = `${lastTotal.toLocaleString()} books found`;
    renderCards(resp.docs);
    if (lastTotal > 20) { document.getElementById('load-more').style.display = 'block'; document.getElementById('load-more').disabled = false; }
  } catch(e) {
    document.getElementById('status').style.display = '';
    document.getElementById('status').textContent = 'Error fetching results. Please try again.';
  }
}

async function loadMore() {
  page++;
  const btn = document.getElementById('load-more');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Loading…';
  try {
    const resp = await fetchBooks(lastQ, page);
    renderCards(resp.docs);
    btn.innerHTML = 'Load more';
    btn.disabled = resp.docs.length < 20 || page * 20 >= lastTotal;
    if (btn.disabled) btn.style.display = 'none';
  } catch(e) {
    btn.innerHTML = 'Load more';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
